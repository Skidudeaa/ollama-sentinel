watch:
  directory: .
  recursive: true
  ignore_patterns:
  - '*.md'
  - '*.log'
  - '**/.ollama_reviews/**'
  debounce_ms: 1500
  max_file_size_kb: 512
  disable_builtin_ignores: false
ollama:
  host: http://localhost:11434
  request_timeout: 600
  models:
    default:
      name: deepseek-v4-pro:cloud
      think: false
      system_prompt: 'You are a senior code reviewer. Return constructive, actionable
        feedback for each file: identify bugs (with line numbers), design smells,
        and small refactors that improve readability and performance. Respond in GitHub-flavored
        markdown. If the file is auto-generated or purely data, say ''No actionable
        feedback.'''
      context_window: 8192
      output_reserve_tokens: 2000
    triage:
      name: deepseek-v4-pro:cloud
      think: false
      system_prompt: "You are a senior developer helping triage a failing build or\
        \ test run.\nGiven the tool output and referenced source code, respond with:\n\
        \n1. DIAGNOSIS: one-sentence root cause (be specific \u2014 name the variable,\n\
        \   function, or assertion).\n2. FIX: the concrete change. Include a unified\
        \ diff when possible.\n3. CONFIDENCE: low / medium / high, based on whether\
        \ the provided\n   source is sufficient to be sure.\n\nIf the source isn't\
        \ enough, say so and name what else you'd need.\nDo not speculate beyond the\
        \ evidence."
      context_window: 8192
      output_reserve_tokens: 2000
processing:
  max_concurrent_reviews: 1
  max_concurrent_chunks_per_file: 1
  git_diff_mode: false
output:
  directory: .ollama_reviews
  format: markdown
  console_output: true
  compress: false
  diff_based_history: false
  history:
    enabled: true
    max_versions: 5
memory:
  enabled: true
  db_path: .ollama_reviews/memory.db
  neighbor_k: 10
  semantic_recall: true
embedding:
  enabled: true
  timeout_seconds: 120
  models:
    hot: qwen3-embedding:4b
    consolidation: qwen3-embedding:8b
    rerank: null
