name: tests
on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        extras: ["dev", "dev,research"]
    name: pytest (${{ matrix.extras }})
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -e ".[${{ matrix.extras }}]"
      - run: pytest tests/ -q
